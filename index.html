<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare HMS | Final Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        .nav-active { background: #10b981; color: white; }
    </style>
</head>
<body>

    <div id="notification-container" class="fixed top-6 right-6 z-[500]"></div>

    <div id="authSection" class="flex items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-[400px] glass-card p-10 text-center border border-white">
            <h1 class="text-3xl font-extrabold mb-8 text-slate-900">Sign In</h1>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="admin@test.com" class="w-full px-6 py-4 rounded-2xl bg-slate-100 outline-none">
                <input type="password" id="loginPass" placeholder="123" class="w-full px-6 py-4 rounded-2xl bg-slate-100 outline-none">
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-emerald-600 transition-all shadow-lg">Enter Dashboard</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden p-6 md:p-10 max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-black text-slate-800 tracking-tight">LifeCare Cloud</h2>
            <button onclick="handleLogout()" class="bg-rose-50 text-rose-500 px-6 py-2 rounded-xl font-bold">Logout</button>
        </header>

        <div class="bg-slate-900 rounded-[2.5rem] p-8 mb-8 text-white flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <span id="tipLabel" class="text-[10px] font-black uppercase opacity-50 tracking-widest">Daily Advice</span>
                <h3 id="healthyTip" class="text-xl font-bold mt-1 tracking-tight">Loading your tip...</h3>
            </div>
            <div class="bg-white/10 px-6 py-4 rounded-3xl text-center">
                <p class="text-[10px] opacity-60 font-bold uppercase">Patients</p>
                <h4 id="totalPatients" class="text-2xl font-black text-emerald-400">0</h4>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-xl">Staff Management</h3>
                    <button onclick="toggleModal('staffModal')" class="text-emerald-500 font-bold text-sm">+ Add</button>
                </div>
                <div id="staffList" class="space-y-3"></div>
            </div>

            <div class="glass-card p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-xl">Patient Queue</h3>
                    <button onclick="toggleModal('patientModal')" class="text-emerald-500 font-bold text-sm">+ New</button>
                </div>
                <div id="patientList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="patientModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-[100]">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm">
            <h2 class="font-bold mb-4">New Patient</h2>
            <input id="pName" placeholder="Name" class="w-full p-4 bg-slate-100 rounded-xl mb-3 outline-none">
            <input id="pDisease" placeholder="Disease" class="w-full p-4 bg-slate-100 rounded-xl mb-4 outline-none">
            <button onclick="saveData('patients')" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-bold">Add Patient</button>
            <button onclick="toggleModal('patientModal')" class="w-full mt-2 text-slate-400">Close</button>
        </div>
    </div>

    <div id="staffModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-[100]">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm">
            <h2 class="font-bold mb-4">Add Staff</h2>
            <input id="sName" placeholder="Name" class="w-full p-4 bg-slate-100 rounded-xl mb-3 outline-none">
            <input id="sRole" placeholder="Role" class="w-full p-4 bg-slate-100 rounded-xl mb-4 outline-none">
            <button onclick="saveData('staff')" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Register Staff</button>
            <button onclick="toggleModal('staffModal')" class="w-full mt-2 text-slate-400">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyANCd9_8skLjVS_IaVgfbk24ZAlYeZpCR8",
            authDomain: "lifecare-hms-117d8.firebaseapp.com",
            projectId: "lifecare-hms-117d8",
            storageBucket: "lifecare-hms-117d8.firebasestorage.app",
            messagingSenderId: "489995234025",
            appId: "1:489995234025:web:c5a7d23f71b71aa2e51e78"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. LOGIN LOGIC
        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            if (email === "admin@test.com" && pass === "123") {
                localStorage.setItem('hms_login', 'true');
                location.reload();
            } else {
                alert("Ghalat Email ya Password!");
            }
        }

        function handleLogout() {
            localStorage.removeItem('hms_login');
            location.reload();
        }

        // 2. TIPS LOGIC (3 Times a Day)
        function setTips() {
            const hr = new Date().getHours();
            let tip = "", lbl = "";
            if(hr < 12) { lbl = "Morning ☀️"; tip = "Drink water and eat a healthy breakfast!"; }
            else if(hr < 17) { lbl = "Afternoon 🌤️"; tip = "Take a short walk and stay hydrated."; }
            else { lbl = "Evening 🌙"; tip = "Have a light dinner and sleep well."; }
            document.getElementById('healthyTip').innerText = tip;
            document.getElementById('tipLabel').innerText = lbl;
        }

        // 3. DATA SYNC
        function syncData() {
            // Patients Queue
            db.collection("patients").orderBy("time", "asc").onSnapshot(snap => {
                const list = document.getElementById('patientList');
                document.getElementById('totalPatients').innerText = snap.size;
                list.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    list.innerHTML += `<div class="p-4 bg-slate-50 rounded-2xl flex justify-between">
                        <span><b>${p.name}</b> (${p.disease})</span>
                        <button onclick="deleteDoc('patients', '${doc.id}')" class="text-rose-400">✕</button>
                    </div>`;
                });
            });

            // Staff List
            db.collection("staff").onSnapshot(snap => {
                const list = document.getElementById('staffList');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const s = doc.data();
                    list.innerHTML += `<div class="p-4 bg-emerald-50 rounded-2xl flex justify-between border border-emerald-100">
                        <span><b>${s.name}</b> - ${s.role}</span>
                        <button onclick="deleteDoc('staff', '${doc.id}')" class="text-rose-400">✕</button>
                    </div>`;
                });
            });
        }

        // 4. SAVE DATA
        async function saveData(type) {
            if(type === 'patients') {
                const n = document.getElementById('pName').value;
                const d = document.getElementById('pDisease').value;
                if(n && d) {
                    await db.collection("patients").add({ name: n, disease: d, time: new Date() });
                    toggleModal('patientModal');
                }
            } else {
                const n = document.getElementById('sName').value;
                const r = document.getElementById('sRole').value;
                if(n && r) {
                    await db.collection("staff").add({ name: n, role: r });
                    toggleModal('staffModal');
                }
            }
        }

        function deleteDoc(col, id) { if(confirm("Delete?")) db.collection(col).doc(id).delete(); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        // STARTUP
        if (localStorage.getItem('hms_login') === 'true') {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            setTips();
            syncData();
        }
    </script>
</body>
</html>
