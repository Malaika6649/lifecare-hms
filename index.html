<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare Pro | Professional HMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50">

    <div class="flex min-h-screen">
        <aside id="sidebar" class="sidebar shadow-xl active">
            <div class="p-6 border-b border-slate-100 flex items-center gap-3 text-blue-600">
                <i class="fas fa-hospital-user text-3xl"></i>
                <span class="font-bold text-xl tracking-tight text-slate-800">LifeCare</span>
            </div>
            <nav class="mt-6 flex-1">
                <button onclick="showPage('dashboard')" class="nav-btn active" id="btn-dashboard">
                    <i class="fas fa-th-large"></i> Dashboard
                </button>
                <button onclick="showPage('pharmacy')" class="nav-btn" id="btn-pharmacy">
                    <i class="fas fa-capsules"></i> Pharmacy
                </button>
                <button onclick="showPage('staff')" class="nav-btn" id="btn-staff">
                    <i class="fas fa-user-md"></i> Doctors/Staff
                </button>
                <button onclick="showPage('lab')" class="nav-btn" id="btn-lab">
                    <i class="fas fa-microscope"></i> Lab Reports
                </button>
            </nav>
            <div class="p-6 bg-blue-600 text-white m-4 rounded-2xl shadow-lg">
                <p class="text-[10px] font-bold uppercase opacity-70 italic">Emergency 24/7</p>
                <p class="font-bold text-lg">0800-911-22</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-8 sticky top-0 z-30">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="md:hidden text-2xl text-slate-600"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2 id="greetingText" class="font-bold text-slate-800 text-sm md:text-lg italic">Hello!</h2>
                        <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest" id="liveClock"></p>
                    </div>
                </div>
                <div class="flex items-center gap-5">
                    <div id="notif-bell" class="relative text-slate-400 cursor-pointer">
                        <i class="fas fa-bell"></i>
                        <span class="absolute -top-1 -right-1 w-2 h-2 bg-rose-500 rounded-full animate-ping"></span>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=2563eb&color=fff" class="w-10 h-10 rounded-xl border-2 border-slate-100">
                </div>
            </header>

            <div id="content" class="p-6 overflow-y-auto">
                <div id="page-dashboard" class="page-section">
                    <div class="bg-gradient-to-r from-blue-600 to-cyan-500 rounded-[2.5rem] p-10 text-white relative overflow-hidden mb-10 shadow-2xl">
                        <div class="relative z-10 max-w-lg">
                            <span class="bg-white/20 px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">Daily Health Tip</span>
                            <h3 id="healthTip" class="text-2xl font-bold mt-4 leading-relaxed italic">Loading wisdom...</h3>
                        </div>
                        <i class="fas fa-stethoscope absolute right-[-20px] bottom-[-40px] text-[15rem] text-white opacity-10 rotate-12"></i>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 text-center">
                        <div class="card p-6 border-l-4 border-l-blue-500">
                            <p class="text-xs text-slate-400 font-bold uppercase">Patients Today</p>
                            <h4 id="countP" class="text-3xl font-black text-slate-800">0</h4>
                        </div>
                        <div class="card p-6 border-l-4 border-l-emerald-500">
                            <p class="text-xs text-slate-400 font-bold uppercase">Doctors Online</p>
                            <h4 class="text-3xl font-black text-slate-800">10</h4>
                        </div>
                    </div>

                    <div class="card overflow-hidden bg-white">
                        <div class="p-6 border-b flex justify-between items-center">
                            <h3 class="font-bold text-slate-800">Current Admission Queue</h3>
                            <button onclick="openModal('patientModal')" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-700">+ New Entry</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <tbody id="patientTableBody">
                                    <tr><td class="p-10 text-center"><div class="h-10 skeleton w-full"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="page-pharmacy" class="page-section hidden">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                        <h2 class="text-2xl font-black text-slate-800">LifeCare Pharmacy</h2>
                        <div class="flex gap-4 w-full md:w-auto">
                            <input type="text" id="searchMedInput" placeholder="Search 100+ Medicines..." class="form-input flex-1 md:w-80" onkeyup="filterMeds()">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-6" id="medicineGrid">
                        </div>
                </div>

                <div id="page-staff" class="page-section hidden">
                    <h2 class="text-2xl font-black text-slate-800 mb-8">Medical Specialists</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="doctorGrid">
                        </div>
                </div>

                <div id="page-lab" class="page-section hidden">
                    <div class="card p-10 max-w-4xl mx-auto text-center">
                        <i class="fas fa-vials text-5xl text-blue-100 mb-4"></i>
                        <h3 class="text-xl font-bold mb-6 italic">Laboratory Reports & Archives</h3>
                        <div id="labList" class="space-y-4 text-left">
                            <div class="p-4 bg-slate-50 rounded-xl border border-dashed border-slate-200 text-center text-slate-400 font-bold">
                                No reports available at the moment.
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="patientModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-black mb-6">Patient Admission</h3>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="Full Name" class="form-input">
                <input type="text" id="pDisease" placeholder="Disease Detail" class="form-input">
                <button onclick="savePatient()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl">Add Entry</button>
                <button onclick="closeModal('patientModal')" class="w-full text-slate-400 font-bold text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
