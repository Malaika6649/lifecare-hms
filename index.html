<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare HMS | Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-72 bg-slate-900 text-slate-300 shadow-2xl flex flex-col">
            <div class="p-8 text-2xl font-black text-white border-b border-slate-800 flex items-center gap-2">
                <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center text-xs">LC</div>
                Life<span class="text-cyan-400">Care+</span>
            </div>
            <nav class="mt-8 px-4 flex-1 space-y-2">
                <button onclick="showSection('dashboard')" class="w-full text-left py-3.5 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    📊 Dashboard
                </button>
                <button onclick="showSection('appointments')" class="w-full text-left py-3.5 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    📅 Appointments
                </button>
                <button onclick="showSection('pharmacy')" class="w-full text-left py-3.5 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    💊 Online Pharmacy
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto bg-[#f8fafc]">
            
            <div id="dashboardSection">
                <header class="flex justify-between items-center mb-8">
                    <h1 class="text-4xl font-extrabold text-slate-900">Hospital Dashboard</h1>
                    <button onclick="toggleModal()" class="bg-cyan-500 text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg shadow-cyan-200 hover:bg-cyan-600 transition-all">
                        + Add Patient
                    </button>
                </header>

                <div class="mb-6 relative">
                    <input type="text" id="searchInput" onkeyup="searchPatient()" placeholder="Search patient by name..." 
                    class="w-full pl-6 pr-4 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-cyan-400 outline-none transition-all">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Total Patients</p>
                        <h3 id="totalPatients" class="text-5xl font-black text-slate-900 mt-2">0</h3>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Today's Visits</p>
                        <h3 class="text-5xl font-black text-slate-900 mt-2">05</h3>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Med Stock</p>
                        <h3 class="text-5xl font-black text-slate-900 mt-2">120</h3>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="p-6 text-slate-400 font-bold text-xs uppercase">Patient Name</th>
                                <th class="p-6 text-slate-400 font-bold text-xs uppercase">Diagnosis</th>
                                <th class="p-6 text-slate-400 font-bold text-xs uppercase">Manage</th>
                            </tr>
                        </thead>
                        <tbody id="patientList"></tbody>
                    </table>
                </div>
            </div>

            <div id="appointmentsSection" class="hidden">
                <h2 class="text-3xl font-extrabold mb-8 text-slate-900">Book Appointment</h2>
                <div class="bg-white p-10 rounded-[2rem] shadow-sm border border-slate-100 max-w-lg">
                    <div class="space-y-6">
                        <input id="appDate" type="date" class="bg-slate-50 p-4 rounded-xl w-full outline-none focus:ring-2 focus:ring-cyan-400">
                        <select id="docSelect" class="bg-slate-50 p-4 rounded-xl w-full outline-none focus:ring-2 focus:ring-cyan-400">
                            <option>Dr. Ahmed (Heart Specialist)</option>
                            <option>Dr. Sara (Skin Specialist)</option>
                            <option>Dr. Zain (General Physician)</option>
                        </select>
                        <button onclick="bookAppoint()" class="bg-slate-900 text-white py-4 rounded-xl w-full font-black hover:bg-black transition-all">Confirm Appointment</button>
                    </div>
                </div>
            </div>

            <div id="pharmacySection" class="hidden">
                <h2 class="text-3xl font-extrabold mb-8 text-slate-900">Online Pharmacy</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 text-center">
                        <p class="font-black text-2xl text-slate-800">Panadol</p>
                        <p class="text-cyan-500 font-black mb-6">Rs. 50</p>
                        <button onclick="buyMed('Panadol', 50)" class="bg-slate-900 text-white py-3 rounded-xl w-full font-bold">Buy Now</button>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 text-center">
                        <p class="font-black text-2xl text-slate-800">Cough Syrup</p>
                        <p class="text-cyan-500 font-black mb-6">Rs. 150</p>
                        <button onclick="buyMed('Cough Syrup', 150)" class="bg-slate-900 text-white py-3 rounded-xl w-full font-bold">Buy Now</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h2 class="text-3xl font-black mb-6 text-slate-900 italic">Add Patient</h2>
            <input id="name" type="text" placeholder="Patient Full Name" class="w-full bg-slate-50 p-4 rounded-2xl mb-4 outline-none">
            <input id="disease" type="text" placeholder="Diagnosis" class="w-full bg-slate-50 p-4 rounded-2xl mb-8 outline-none">
            <div class="flex flex-col gap-3">
                <button onclick="savePatient()" class="bg-cyan-500 text-white py-4 rounded-2xl font-black text-lg">Save Record</button>
                <button onclick="toggleModal()" class="text-slate-400 font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <div id="billModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[2.5rem] w-full max-w-xs overflow-hidden shadow-2xl">
            <div class="bg-slate-900 p-8 text-white text-center">
                <h2 class="text-xl font-black uppercase tracking-widest">Receipt</h2>
            </div>
            <div class="p-8">
                <div class="flex justify-between mb-4 text-xs font-black uppercase text-slate-400">
                    <span>Item:</span> <span id="billItem" class="text-slate-800">-</span>
                </div>
                <div class="flex justify-between mb-8 pb-4 border-b border-dashed">
                    <span class="text-xs font-black uppercase text-slate-400">Total:</span> 
                    <span id="billTotal" class="text-cyan-500 font-black text-xl">-</span>
                </div>
                <button onclick="closeBill()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black hover:bg-black transition-all">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
