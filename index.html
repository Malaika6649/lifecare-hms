<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare Pro | Professional HMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50">

    <div class="flex min-h-screen">
        <aside id="sidebar" class="sidebar shadow-xl">
            <div class="p-6 border-b border-slate-100 flex items-center gap-3 text-blue-600">
                <i class="fas fa-hospital-user text-3xl"></i>
                <span class="font-bold text-xl tracking-tight">LifeCare</span>
            </div>
            <nav class="mt-6 flex-1 px-4 space-y-2">
                <button onclick="showPage('dashboard')" class="nav-btn active" id="btn-dashboard"><i class="fas fa-th-large mr-3"></i> Dashboard</button>
                <button onclick="showPage('appointment')" class="nav-btn" id="btn-appointment"><i class="fas fa-calendar-alt mr-3"></i> Appointments</button>
                <button onclick="showPage('pharmacy')" class="nav-btn" id="btn-pharmacy"><i class="fas fa-capsules mr-3"></i> Pharmacy</button>
                <button onclick="showPage('lab')" class="nav-btn" id="btn-lab"><i class="fas fa-microscope mr-3"></i> Lab Reports</button>
                <button onclick="showPage('staff')" class="nav-btn" id="btn-staff"><i class="fas fa-user-md mr-3"></i> Doctors/Staff</button>
            </nav>
            <div class="p-6 bg-blue-600 text-white m-4 rounded-2xl shadow-lg">
                <p class="text-[10px] font-bold uppercase opacity-70">Emergency</p>
                <p class="font-bold text-lg">0800-911-22</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-8 sticky top-0 z-30">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="md:hidden text-2xl text-slate-600"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2 id="greetingText" class="font-bold text-slate-800">Hello!</h2>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest" id="liveClock"></p>
                    </div>
                </div>
                <div class="flex items-center gap-5">
                    <div id="notif-bell" class="relative text-slate-400 cursor-pointer"><i class="fas fa-bell"></i><span class="absolute -top-1 -right-1 w-2 h-2 bg-rose-500 rounded-full"></span></div>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=2563eb&color=fff" class="w-10 h-10 rounded-xl">
                </div>
            </header>

            <div id="content" class="p-6 overflow-y-auto">
                <div id="page-dashboard" class="page-section">
                    <div class="bg-gradient-to-r from-blue-600 to-cyan-500 rounded-[2.5rem] p-10 text-white relative overflow-hidden mb-10 shadow-2xl">
                        <div class="relative z-10 max-w-lg">
                            <span class="bg-white/20 px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">Daily Health Tip</span>
                            <h3 id="healthTip" class="text-2xl font-bold mt-4 leading-relaxed italic">Loading wisdom...</h3>
                        </div>
                        <i class="fas fa-stethoscope absolute right-[-20px] bottom-[-40px] text-[15rem] text-white opacity-10 rotate-12"></i>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                        <div class="card p-6 flex items-center gap-4 border-l-4 border-l-blue-500">
                            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-users"></i></div>
                            <div><p class="text-xs text-slate-400 font-bold uppercase">Total Patients</p><h4 id="countP" class="text-2xl font-black">0</h4></div>
                        </div>
                        <div class="card p-6 flex items-center gap-4 border-l-4 border-l-emerald-500">
                            <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-clock"></i></div>
                            <div><p class="text-xs text-slate-400 font-bold uppercase">Active Doctors</p><h4 id="countD" class="text-2xl font-black">0</h4></div>
                        </div>
                    </div>

                    <div class="card overflow-hidden">
                        <div class="p-6 border-b flex justify-between items-center bg-white">
                            <h3 class="font-bold text-slate-800">Current Admission Queue</h3>
                            <button onclick="openModal('patientModal')" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-700 transition-all">+ New Entry</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50/80">
                                    <tr>
                                        <th class="p-5 text-[10px] font-black uppercase text-slate-400">Patient Details</th>
                                        <th class="p-5 text-[10px] font-black uppercase text-slate-400">Diagnosis</th>
                                        <th class="p-5 text-right text-[10px] font-black uppercase text-slate-400">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="patientTableBody">
                                    <tr class="skeleton-row">
                                        <td colspan="3" class="p-5"><div class="h-10 skeleton w-full"></div></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="page-pharmacy" class="page-section hidden">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-2xl font-black text-slate-800">LifeCare Pharmacy</h2>
                        <div class="flex gap-4">
                            <input type="text" placeholder="Search medicine..." class="px-5 py-3 rounded-2xl border-none ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-blue-500 w-64 text-sm shadow-sm" id="searchMed">
                            <button onclick="showCart()" class="bg-emerald-500 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg shadow-emerald-200"><i class="fas fa-shopping-basket mr-2"></i> Bill Cart</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-6" id="medicineGrid">
                        </div>
                </div>

                <div id="page-staff" class="page-section hidden">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="doctorGrid">
                        </div>
                </div>

                <div id="page-lab" class="page-section hidden">
                    <div class="card p-10 max-w-4xl mx-auto text-center">
                        <i class="fas fa-vials text-5xl text-blue-100 mb-4"></i>
                        <h3 class="text-xl font-bold mb-6">Laboratory Archives</h3>
                        <div id="labList" class="space-y-4 text-left">
                            </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="patientModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-black mb-6">Patient Admission</h3>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="Full Name" class="form-input">
                <input type="text" id="pDisease" placeholder="Disease Detail" class="form-input">
                <button onclick="savePatient()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-blue-100">Add Entry</button>
                <button onclick="closeModal('patientModal')" class="w-full text-slate-400 font-bold text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
