<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare Cloud | Open Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">LifeCare Cloud</h1>
                <p class="text-slate-500 font-medium text-sm">Real-time Hospital Management</p>
            </div>

            <div id="authBox" class="glass-card p-6 flex flex-wrap items-center gap-3 bg-emerald-50 border-emerald-100">
                <input type="email" id="loginEmail" placeholder="admin@test.com" class="px-4 py-2 rounded-xl border-0 text-sm outline-none w-40">
                <input type="password" id="loginPass" placeholder="123" class="px-4 py-2 rounded-xl border-0 text-sm outline-none w-32">
                <button onclick="handleLogin()" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-emerald-600 transition-all">Sign In</button>
            </div>

            <div id="userBox" class="hidden glass-card p-4 flex items-center gap-4 border-emerald-200">
                <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white font-bold text-xs">AD</div>
                <div>
                    <p class="text-xs font-black leading-none">Admin User</p>
                    <button onclick="handleLogout()" class="text-[10px] text-rose-500 font-bold uppercase tracking-tighter hover:underline">Sign Out</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="md:col-span-2 bg-slate-900 rounded-[2.5rem] p-8 text-white flex flex-col justify-center min-h-[160px]">
                <span id="tipLabel" class="text-[10px] font-bold uppercase opacity-50 tracking-widest mb-2">System Advice</span>
                <h3 id="healthyTip" class="text-xl md:text-2xl font-bold leading-tight">Please sign in to access full system controls.</h3>
            </div>
            <div class="glass-card p-8 flex flex-col items-center justify-center text-center">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Live Queue</p>
                <h4 id="totalPatients" class="text-5xl font-black text-emerald-500 mt-2">0</h4>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-8">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="font-bold text-xl tracking-tight">Patient Queue (FIFO)</h3>
                    <button id="addPatientBtn" onclick="checkAuthAndOpen('patientModal')" class="bg-emerald-500 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-lg shadow-emerald-200">+ New Patient</button>
                </div>
                <div id="patientList" class="space-y-4">
                    <p class="text-slate-400 text-sm italic">Syncing with cloud...</p>
                </div>
            </div>

            <div class="glass-card p-8">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="font-bold text-xl tracking-tight">Medical Staff</h3>
                    <button id="addStaffBtn" onclick="checkAuthAndOpen('staffModal')" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-lg shadow-slate-200">+ Register Staff</button>
                </div>
                <div id="staffList" class="space-y-4">
                    <p class="text-slate-400 text-sm italic">Loading directory...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="patientModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6 z-[100]">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Patient Entry</h2>
            <input id="pName" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-2xl mb-3 outline-none border border-slate-100 focus:border-emerald-400">
            <input id="pDisease" placeholder="Diagnosis" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 outline-none border border-slate-100 focus:border-emerald-400">
            <button onclick="saveData('patients')" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold shadow-xl">Add to Queue</button>
            <button onclick="toggleModal('patientModal')" class="w-full mt-4 text-slate-400 font-bold text-sm">Cancel</button>
        </div>
    </div>

    <div id="staffModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6 z-[100]">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Staff Registration</h2>
            <input id="sName" placeholder="Staff Name" class="w-full p-4 bg-slate-50 rounded-2xl mb-3 outline-none border border-slate-100 focus:border-emerald-400">
            <input id="sRole" placeholder="Role (e.g., Surgeon)" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 outline-none border border-slate-100 focus:border-emerald-400">
            <button onclick="saveData('staff')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl">Register Staff</button>
            <button onclick="toggleModal('staffModal')" class="w-full mt-4 text-slate-400 font-bold text-sm">Cancel</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyANCd9_8skLjVS_IaVgfbk24ZAlYeZpCR8",
            authDomain: "lifecare-hms-117d8.firebaseapp.com",
            projectId: "lifecare-hms-117d8",
            storageBucket: "lifecare-hms-117d8.firebasestorage.app",
            messagingSenderId: "489995234025",
            appId: "1:489995234025:web:c5a7d23f71b71aa2e51e78"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // AUTH FUNCTIONS
        function handleLogin() {
            const e = document.getElementById('loginEmail').value;
            const p = document.getElementById('loginPass').value;
            if(e === "admin@test.com" && p === "123") {
                localStorage.setItem('hms_auth', 'true');
                showLoggedInUI();
            } else {
                alert("Incorrect Credentials!");
            }
        }

        function handleLogout() {
            localStorage.removeItem('hms_auth');
            location.reload();
        }

        function showLoggedInUI() {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('userBox').classList.remove('hidden');
            setTips();
        }

        function checkAuthAndOpen(modalId) {
            if(localStorage.getItem('hms_auth') === 'true') {
                toggleModal(modalId);
            } else {
                alert("Please Sign In first to modify data!");
            }
        }

        // TIPS
        function setTips() {
            const hr = new Date().getHours();
            let msg = "", lbl = "";
            if(hr < 12) { lbl = "Morning Advice"; msg = "Morning shift: Ensure all patient files are updated."; }
            else if(hr < 17) { lbl = "Afternoon Advice"; msg = "Mid-day check: Monitor the queue for priority cases."; }
            else { lbl = "Evening Advice"; msg = "Evening shift: Handover protocols must be followed."; }
            document.getElementById('healthyTip').innerText = msg;
            document.getElementById('tipLabel').innerText = lbl;
        }

        // DATA SYNC (Always visible)
        function startSync() {
            db.collection("patients").orderBy("time", "asc").onSnapshot(snap => {
                const list = document.getElementById('patientList');
                document.getElementById('totalPatients').innerText = snap.size;
                list.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    const isAuth = localStorage.getItem('hms_auth') === 'true';
                    list.innerHTML += `
                        <div class="flex justify-between items-center p-5 bg-slate-50 rounded-2xl border border-slate-100 group">
                            <div>
                                <p class="font-bold text-slate-800 text-sm">${p.name}</p>
                                <p class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest mt-1">${p.disease}</p>
                            </div>
                            ${isAuth ? `<button onclick="deleteDoc('patients', '${doc.id}')" class="text-rose-400 opacity-0 group-hover:opacity-100 transition-all font-bold">✕</button>` : ''}
                        </div>`;
                });
            });

            db.collection("staff").onSnapshot(snap => {
                const list = document.getElementById('staffList');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const s = doc.data();
                    const isAuth = localStorage.getItem('hms_auth') === 'true';
                    list.innerHTML += `
                        <div class="flex justify-between items-center p-5 bg-emerald-50 rounded-2xl border border-emerald-100 group">
                            <div>
                                <p class="font-bold text-slate-800 text-sm">${s.name}</p>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">${s.role}</p>
                            </div>
                            ${isAuth ? `<button onclick="deleteDoc('staff', '${doc.id}')" class="text-rose-400 opacity-0 group-hover:opacity-100 transition-all font-bold">✕</button>` : ''}
                        </div>`;
                });
            });
        }

        // CRUD
        async function saveData(type) {
            if(type === 'patients') {
                const n = document.getElementById('pName').value;
                const d = document.getElementById('pDisease').value;
                if(n && d) {
                    await db.collection("patients").add({ name: n, disease: d, time: new Date() });
                    toggleModal('patientModal');
                }
            } else {
                const n = document.getElementById('sName').value;
                const r = document.getElementById('sRole').value;
                if(n && r) {
                    await db.collection("staff").add({ name: n, role: r });
                    toggleModal('staffModal');
                }
            }
        }

        function deleteDoc(col, id) { if(confirm("Confirm removal?")) db.collection(col).doc(id).delete(); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        // Start Up
        startSync();
        if(localStorage.getItem('hms_auth') === 'true') {
            showLoggedInUI();
        }
    </script>
</body>
</html>
