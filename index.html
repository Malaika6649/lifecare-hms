<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare HMS | All-in-One Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="notification-container" class="fixed top-5 right-5 z-[150] flex flex-col gap-3"></div>

    <div id="authSection" class="flex items-center justify-center min-h-screen p-4 bg-[#f1f5f9]">
        <div class="w-full max-w-[400px] bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 overflow-hidden">
            <div class="bg-slate-900 p-10 text-center text-white">
                <div class="w-12 h-12 bg-cyan-500 rounded-xl flex items-center justify-center text-sm font-black mx-auto mb-4">LC</div>
                <h1 class="text-2xl font-bold">LifeCare <span class="text-cyan-400 font-light">Portal</span></h1>
            </div>
            <div class="p-10 space-y-4">
                <div id="loginFields" class="space-y-4">
                    <input type="email" id="loginEmail" placeholder="Email (admin@test.com)" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border outline-none">
                    <input type="password" id="loginPass" placeholder="Password (123)" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border outline-none">
                    <button onclick="handleLogin()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg">Sign In</button>
                    <p class="text-center text-sm">New? <a href="#" onclick="toggleAuth(true)" class="text-cyan-600 font-bold">Sign Up</a></p>
                </div>
                <div id="signupFields" class="hidden space-y-4">
                    <input type="text" id="regName" placeholder="Full Name" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border outline-none">
                    <input type="email" id="regEmail" placeholder="Email" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border outline-none">
                    <input type="password" id="regPass" placeholder="Password" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border outline-none">
                    <button onclick="handleSignup()" class="w-full bg-cyan-500 text-white font-bold py-4 rounded-2xl shadow-lg">Register</button>
                    <p class="text-center text-sm"><a href="#" onclick="toggleAuth(false)" class="font-bold">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden flex flex-col md:flex-row h-screen overflow-hidden">
        <aside class="w-full md:w-72 bg-slate-900 text-slate-300 shadow-2xl flex flex-col">
            <div class="p-8 text-2xl font-black text-white border-b border-slate-800">LifeCare+</div>
            <nav class="p-4 flex flex-col gap-2 flex-1">
                <button onclick="showSection('dashboard')" class="nav-btn w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 flex items-center gap-3">📊 Dashboard</button>
                <button onclick="showSection('appointments')" class="nav-btn w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 flex items-center gap-3">📅 Appointments</button>
                <button onclick="showSection('pharmacy')" class="nav-btn w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 flex items-center gap-3">💊 Pharmacy</button>
                <button onclick="showSection('staff')" class="nav-btn w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 flex items-center gap-3">👨‍⚕️ Staff</button>
            </nav>
            <div class="p-4"><button onclick="handleLogout()" class="w-full py-3 bg-red-500/10 text-red-400 rounded-xl font-bold">Logout</button></div>
        </aside>

        <main class="flex-1 p-6 md:p-10 overflow-y-auto">
            
            <div id="tipCard" class="p-8 rounded-[2rem] shadow-xl text-white mb-8 transition-all duration-700">
                <span id="tipTime" class="text-xs font-bold uppercase opacity-80">Loading...</span>
                <h2 class="text-2xl font-black mt-2"><span id="tipEmoji">✨</span> <span id="healthyTip">Loading Tip...</span></h2>
            </div>

            <div id="dashboardSection" class="section">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-black">Patients List</h1>
                    <button onclick="toggleModal('modal')" class="bg-cyan-500 text-white px-6 py-3 rounded-xl font-bold">+ Add Patient</button>
                </div>
                <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                    <table class="w-full text-left"><tbody id="patientList"></tbody></table>
                </div>
            </div>

            <div id="appointmentsSection" class="section hidden">
                <h1 class="text-3xl font-black mb-6">Book Appointment</h1>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border max-w-md">
                    <input type="text" placeholder="Patient Name" class="w-full p-4 mb-4 bg-slate-50 border rounded-xl outline-none">
                    <input type="date" class="w-full p-4 mb-6 bg-slate-50 border rounded-xl outline-none">
                    <button onclick="showNotification('Appointment Booked!')" class="w-full bg-cyan-500 text-white py-4 rounded-xl font-bold">Confirm Now</button>
                </div>
            </div>

            <div id="pharmacySection" class="section hidden">
                <h1 class="text-3xl font-black mb-6">Pharmacy Store</h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-6 rounded-2xl border text-center">
                        <h3 class="font-bold">Panadol</h3><p class="text-cyan-600 mb-4">Rs. 50</p>
                        <button onclick="buyMed('Panadol', 50)" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm">Buy Now</button>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border text-center">
                        <h3 class="font-bold">Aspirin</h3><p class="text-cyan-600 mb-4">Rs. 80</p>
                        <button onclick="buyMed('Aspirin', 80)" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm">Buy Now</button>
                    </div>
                </div>
            </div>

            <div id="staffSection" class="section hidden">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-black">Staff Directory</h1>
                    <button onclick="toggleModal('staffModal')" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold">+ Add Staff</button>
                </div>
                <div id="staffList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </main>
    </div>

    <div id="modal" class="modal fixed inset-0 bg-slate-900/60 hidden z-[120] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4">New Patient</h2>
            <input type="text" id="name" placeholder="Name" class="w-full p-4 mb-4 border rounded-xl">
            <input type="text" id="disease" placeholder="Disease" class="w-full p-4 mb-4 border rounded-xl">
            <button onclick="savePatient()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Save</button>
        </div>
    </div>

    <div id="staffModal" class="modal fixed inset-0 bg-slate-900/60 hidden z-[120] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4">New Staff</h2>
            <input type="text" id="staffName" placeholder="Staff Name" class="w-full p-4 mb-4 border rounded-xl">
            <input type="text" id="staffRole" placeholder="Role (e.g. Doctor)" class="w-full p-4 mb-4 border rounded-xl">
            <button onclick="saveStaff()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">Save</button>
        </div>
    </div>

    <script>
        let patients = JSON.parse(localStorage.getItem('hospitalData')) || [];
        let staff = JSON.parse(localStorage.getItem('hospitalStaff')) || [];

        const tipsData = {
            morning: { text: "Morning: Start your day with warm water and breakfast.", emoji: "☀️", color: "from-orange-400 to-yellow-500", label: "Morning Health Tip" },
            afternoon: { text: "Afternoon: Stay hydrated and have a healthy salad.", emoji: "🌤️", color: "from-cyan-500 to-blue-600", label: "Afternoon Health Tip" },
            evening: { text: "Evening: Take a 15-minute walk before bed.", emoji: "🌙", color: "from-indigo-800 to-slate-900", label: "Evening Health Tip" }
        };

        function toggleAuth(isSignup) {
            document.getElementById('loginFields').classList.toggle('hidden', isSignup);
            document.getElementById('signupFields').classList.toggle('hidden', !isSignup);
        }

        function handleSignup() {
            const e = document.getElementById('regEmail').value;
            const p = document.getElementById('regPass').value;
            if(e && p) { localStorage.setItem('storedEmail', e); localStorage.setItem('storedPass', p); showNotification("Signed Up!"); toggleAuth(false); }
        }

        function handleLogin() {
            const e = document.getElementById('loginEmail').value, p = document.getElementById('loginPass').value;
            const se = localStorage.getItem('storedEmail'), sp = localStorage.getItem('storedPass');
            if((e === se && p === sp) || (e === "admin@test.com" && p === "123")) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                localStorage.setItem('isLoggedIn', 'true');
                loadAll();
                showNotification("Welcome!");
            } else { showNotification("Error!", "error"); }
        }

        function loadAll() { renderTable(); renderStaff(); updateHealthTips(); }

        function updateHealthTips() {
            const h = new Date().getHours();
            let tip = (h >= 5 && h < 12) ? tipsData.morning : (h >= 12 && h < 17) ? tipsData.afternoon : tipsData.evening;
            document.getElementById('healthyTip').innerText = tip.text;
            document.getElementById('tipTime').innerText = tip.label;
            document.getElementById('tipEmoji').innerText = tip.emoji;
            document.getElementById('tipCard').className = `p-8 rounded-[2rem] shadow-xl text-white mb-8 bg-gradient-to-r ${tip.color}`;
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + 'Section').classList.remove('hidden');
        }

        function renderTable() {
            document.getElementById('patientList').innerHTML = patients.map(p => `<tr class="border-b"><td class="p-6 font-bold">${p.name}</td><td class="p-6 text-cyan-600">${p.disease}</td><td class="p-6 text-right"><button onclick="deletePatient(${p.id})" class="text-rose-500">Delete</button></td></tr>`).join('');
        }

        function savePatient() {
            const n = document.getElementById('name').value, d = document.getElementById('disease').value;
            if(n && d) { patients.push({id: Date.now(), name: n, disease: d}); localStorage.setItem('hospitalData', JSON.stringify(patients)); renderTable(); toggleModal('modal'); }
        }

        function deletePatient(id) { patients = patients.filter(p => p.id !== id); localStorage.setItem('hospitalData', JSON.stringify(patients)); renderTable(); }

        function renderStaff() {
            document.getElementById('staffList').innerHTML = staff.map(s => `<div class="bg-white p-6 rounded-2xl border flex justify-between"><div><h4 class="font-bold">${s.name}</h4><p class="text-sm opacity-60">${s.role}</p></div><button onclick="deleteStaff(${s.id})" class="text-red-400 text-xs">Remove</button></div>`).join('');
        }

        function saveStaff() {
            const n = document.getElementById('staffName').value, r = document.getElementById('staffRole').value;
            if(n) { staff.push({id: Date.now(), name: n, role: r}); localStorage.setItem('hospitalStaff', JSON.stringify(staff)); renderStaff(); toggleModal('staffModal'); }
        }

        function deleteStaff(id) { staff = staff.filter(s => s.id !== id); localStorage.setItem('hospitalStaff', JSON.stringify(staff)); renderStaff(); }

        function buyMed(m, p) { showNotification(`Bought ${m} for Rs. ${p}`); }

        function showNotification(m, t = 'success') {
            const c = document.getElementById('notification-container');
            const n = document.createElement('div');
            n.className = `${t === 'success' ? 'bg-slate-900' : 'bg-red-600'} text-white px-6 py-4 rounded-2xl shadow-xl font-bold`;
            n.innerText = m; c.appendChild(n); setTimeout(() => n.remove(), 3000);
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function handleLogout() { localStorage.clear(); location.reload(); }

        window.onload = () => { if(localStorage.getItem('isLoggedIn') === 'true') { handleLogin(); } };
    </script>
</body>
</html>
