<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare HMS | Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="authSection" class="flex items-center justify-center min-h-screen p-4 bg-[#f1f5f9]">
        <div class="w-full max-w-[420px] bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 overflow-hidden">
            
            <div class="bg-slate-900 p-10 text-center text-white">
                <div class="w-12 h-12 bg-cyan-500 rounded-xl flex items-center justify-center text-sm font-black mx-auto mb-4">LC</div>
                <h1 class="text-2xl font-bold tracking-tight">LifeCare <span class="text-cyan-400 font-light">Portal</span></h1>
            </div>

            <div class="p-10">
                <div id="loginFields" class="space-y-4">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">Welcome Back</h2>
                    <input type="email" id="loginEmail" placeholder="Email Address" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:border-cyan-500 outline-none transition-all">
                    <input type="password" id="loginPass" placeholder="Password" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:border-cyan-500 outline-none transition-all">
                    <button onclick="handleLogin()" class="w-full bg-slate-900 hover:bg-cyan-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">Sign In</button>
                    <p class="text-center text-sm text-slate-500 mt-4">Don't have an account? <a href="#" onclick="toggleAuth(true)" class="text-cyan-600 font-bold">Sign Up</a></p>
                </div>

                <div id="signupFields" class="hidden space-y-4">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">Create Account</h2>
                    <input type="text" id="regName" placeholder="Full Name" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:border-cyan-500 outline-none transition-all">
                    <input type="email" id="regEmail" placeholder="Email Address" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:border-cyan-500 outline-none transition-all">
                    <input type="password" id="regPass" placeholder="Password" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:border-cyan-500 outline-none transition-all">
                    <button onclick="handleSignup()" class="w-full bg-cyan-500 hover:bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">Register</button>
                    <p class="text-center text-sm text-slate-500 mt-4">Already have account? <a href="#" onclick="toggleAuth(false)" class="text-slate-900 font-bold">Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="hidden flex flex-col md:flex-row h-screen overflow-hidden">
        
        <aside class="w-full md:w-72 bg-slate-900 text-slate-300 shadow-2xl flex flex-col h-auto md:h-full">
            <div class="p-6 md:p-8 text-xl md:2xl font-black text-white border-b border-slate-800 flex items-center gap-2">
                <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center text-xs text-white">LC</div>
                Life<span class="text-cyan-400">Care+</span>
            </div>
            <nav class="p-4 flex flex-row md:flex-col gap-2 overflow-x-auto md:overflow-y-auto custom-scrollbar flex-1">
                <button onclick="showSection('dashboard')" class="whitespace-nowrap flex-1 md:w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    📊 <span class="hidden md:inline">Dashboard</span>
                </button>
                <button onclick="showSection('appointments')" class="whitespace-nowrap flex-1 md:w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    📅 <span class="hidden md:inline">Appointments</span>
                </button>
                <button onclick="showSection('pharmacy')" class="whitespace-nowrap flex-1 md:w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    💊 <span class="hidden md:inline">Pharmacy</span>
                </button>
                <button onclick="showSection('staff')" class="whitespace-nowrap flex-1 md:w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    👨‍⚕️ <span class="hidden md:inline">Staff & Doctors</span>
                </button>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button onclick="handleLogout()" class="w-full py-3 px-4 rounded-xl bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white transition-all font-bold flex items-center gap-3">
                    🚪 <span>Logout</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-10 overflow-y-auto bg-[#f8fafc]">
            <div id="dashboardSection">
                <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                    <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900">Hospital Dashboard</h1>
                    <button onclick="toggleModal()" class="w-full md:w-auto bg-cyan-500 text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg">
                        + Add Patient
                    </button>
                </header>
                </div>
        </main>
    </div>

    <script>
        // Toggle between Login and Signup
        function toggleAuth(isSignup) {
            document.getElementById('loginFields').classList.toggle('hidden', isSignup);
            document.getElementById('signupFields').classList.toggle('hidden', !isSignup);
        }

        // Logic for Signup
        function handleSignup() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;

            if(name && email && pass) {
                localStorage.setItem('storedEmail', email);
                localStorage.setItem('storedPass', pass);
                localStorage.setItem('userName', name);
                alert("Account Created! Now please Login.");
                toggleAuth(false);
            } else {
                alert("Please fill all details.");
            }
        }

        // Logic for Login
        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const sEmail = localStorage.getItem('storedEmail');
            const sPass = localStorage.getItem('storedPass');

            if(email === sEmail && pass === sPass) {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                localStorage.setItem('isLoggedIn', 'true');
            } else {
                alert("Invalid Credentials! Please Signup first.");
            }
        }

        function handleLogout() {
            localStorage.removeItem('isLoggedIn');
            location.reload();
        }

        // Check login on Page Load
        window.onload = function() {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
