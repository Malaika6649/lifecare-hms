<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeCare HMS | Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="notification-container" class="fixed bottom-5 right-5 z-[1000] flex flex-col gap-3"></div>

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        
        <aside class="w-full md:w-72 bg-slate-900 text-slate-300 shadow-2xl flex flex-col h-auto md:h-full">
            <div class="p-6 md:p-8 text-xl md:2xl font-black text-white border-b border-slate-800 flex items-center gap-2">
                <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center text-xs text-white">LC</div>
                Life<span class="text-cyan-400">Care+</span>
            </div>
            <nav class="p-4 flex flex-row md:flex-col gap-2 overflow-x-auto md:overflow-y-auto custom-scrollbar">
                <button onclick="showSection('dashboard')" class="whitespace-nowrap flex-1 md:w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    📊 <span class="hidden md:inline">Dashboard</span>
                </button>
                <button onclick="showSection('appointments')" class="whitespace-nowrap flex-1 md:w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    📅 <span class="hidden md:inline">Appointments</span>
                </button>
                <button onclick="showSection('pharmacy')" class="whitespace-nowrap flex-1 md:w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    💊 <span class="hidden md:inline">Pharmacy</span>
                </button>
                <button onclick="showSection('staff')" class="whitespace-nowrap flex-1 md:w-full text-left py-3 px-4 rounded-xl hover:bg-slate-800 hover:text-cyan-400 transition-all flex items-center gap-3 font-semibold">
                    👨‍⚕️ <span class="hidden md:inline">Staff & Doctors</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-4 md:p-10 overflow-y-auto bg-[#f8fafc]">
            
            <div id="dashboardSection">
                <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                    <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900">Hospital Dashboard</h1>
                    <button onclick="toggleModal()" class="w-full md:w-auto bg-cyan-500 text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg hover:bg-cyan-600 transition-all">
                        + Add Patient
                    </button>
                </header>

                <div id="tipCard" class="bg-gradient-to-r from-cyan-500 to-blue-600 p-8 rounded-[2rem] shadow-xl text-white mb-8 relative overflow-hidden group">
                    <div class="relative z-10">
                        <p id="tipTime" class="text-cyan-100 text-xs font-black uppercase tracking-[0.2em] mb-2">Health Tip</p>
                        <h3 id="healthyTip" class="text-xl md:text-2xl font-bold leading-relaxed">Loading...</h3>
                    </div>
                    <div class="absolute -right-10 -bottom-10 opacity-20 transform group-hover:scale-110 transition-all duration-500">
                        <span id="tipEmoji" class="text-[120px]">☀️</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8 mb-8">
                    <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Total Patients</p>
                        <h3 id="totalPatients" class="text-4xl md:text-5xl font-black text-slate-900 mt-2">0</h3>
                    </div>
                    <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Today's Visits</p>
                        <h3 class="text-4xl md:text-5xl font-black text-slate-900 mt-2">05</h3>
                    </div>
                    <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Med Stock</p>
                        <h3 class="text-4xl md:text-5xl font-black text-slate-900 mt-2">120</h3>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-x-auto">
                    <table class="w-full text-left min-w-[500px]">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="p-6 text-slate-400 font-bold text-xs uppercase">Patient Name</th>
                                <th class="p-6 text-slate-400 font-bold text-xs uppercase">Diagnosis</th>
                                <th class="p-6 text-slate-400 font-bold text-xs uppercase text-right">Manage</th>
                            </tr>
                        </thead>
                        <tbody id="patientList"></tbody>
                    </table>
                </div>
            </div>

            <div id="appointmentsSection" class="hidden">
                <h2 class="text-3xl font-extrabold mb-8 text-slate-900">Book Appointment</h2>
                <div class="bg-white p-10 rounded-[2rem] shadow-sm border border-slate-100 max-w-lg">
                    <div class="space-y-6">
                        <input id="appDate" type="date" class="bg-slate-50 p-4 rounded-xl w-full outline-none border focus:border-cyan-400">
                        <select id="docSelect" class="bg-slate-50 p-4 rounded-xl w-full outline-none border focus:border-cyan-400">
                            <option>Dr. Ahmed (Heart Specialist)</option>
                            <option>Dr. Sara (Skin Specialist)</option>
                        </select>
                        <button onclick="bookAppoint()" class="bg-slate-900 text-white py-4 rounded-xl w-full font-black hover:bg-black transition-all">Confirm Appointment</button>
                    </div>
                </div>
            </div>

            <div id="pharmacySection" class="hidden">
                <h2 class="text-3xl font-extrabold mb-8 text-slate-900">Pharmacy</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="bg-white p-8 rounded-[2rem] border text-center">
                        <p class="font-black text-2xl">Panadol</p>
                        <p class="text-cyan-500 font-bold mb-4">Rs. 50</p>
                        <button onclick="buyMed('Panadol', 50)" class="bg-slate-900 text-white py-3 px-6 rounded-xl font-bold">Buy Now</button>
                    </div>
                </div>
            </div>

            <div id="staffSection" class="hidden">
                <header class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-extrabold text-slate-900">Staff Management</h1>
                    <button onclick="toggleStaffModal()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg">+ Add Staff</button>
                </header>
                <div id="staffList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Add Patient</h2>
            <input id="name" type="text" placeholder="Name" class="w-full bg-slate-50 p-4 rounded-2xl mb-4 border focus:border-cyan-400 outline-none">
            <input id="disease" type="text" placeholder="Disease" class="w-full bg-slate-50 p-4 rounded-2xl mb-6 border focus:border-cyan-400 outline-none">
            <button onclick="savePatient()" class="w-full bg-cyan-500 text-white py-4 rounded-2xl font-black mb-2">Save Record</button>
            <button onclick="toggleModal()" class="w-full text-slate-400 font-bold">Cancel</button>
        </div>
    </div>

    <div id="staffModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Add Staff Member</h2>
            <input id="staffName" type="text" placeholder="Full Name" class="w-full bg-slate-50 p-4 rounded-2xl mb-4 border focus:border-indigo-400 outline-none">
            <select id="staffRole" class="w-full bg-slate-50 p-4 rounded-2xl mb-6 border focus:border-indigo-400 outline-none">
                <option>Doctor</option>
                <option>Nurse</option>
            </select>
            <button onclick="saveStaff()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black mb-2">Save Staff</button>
            <button onclick="toggleStaffModal()" class="w-full text-slate-400 font-bold">Cancel</button>
        </div>
    </div>

    <div id="billModal" class="hidden fixed inset-0 bg-slate-900/80 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[2rem] w-80 p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-4">Receipt</h2>
            <p id="billItem" class="text-slate-500 mb-1">-</p>
            <p id="billTotal" class="text-cyan-500 font-black text-2xl mb-6">-</p>
            <button onclick="closeBill()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
